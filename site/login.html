<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SPDA SmartLab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Acesso ao Sistema</h2>
        
        <input type="email" id="email-login" placeholder="E-mail" required>
        <input type="password" id="senha-login" placeholder="Senha" required>
        
        <button id="btn-login">Entrar</button>
        
        <p style="margin-top: 15px; font-size: 0.9em;">
            Não tem conta? <a href="cadastro.html" style="color: #4CAF50;">Cadastre-se</a>
        </p>
    </div>

    <script src="login.js"></script>
</body>
</html>
